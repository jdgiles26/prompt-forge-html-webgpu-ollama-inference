<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROMPT FORGE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap');

  :root {
    --bg:        #080c0f;
    --surface:   #0d1318;
    --panel:     #111820;
    --border:    #1e2d3a;
    --accent:    #00c8ff;
    --amber:     #ffb800;
    --red:       #ff3b3b;
    --green:     #00ff88;
    --dim:       #3a5060;
    --text:      #c8dde8;
    --muted:     #4a6878;
    --mono:      'Share Tech Mono', monospace;
    --sans:      'Rajdhani', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    overflow: hidden;
  }

  /* scanline overlay */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.05) 2px,
      rgba(0,0,0,0.05) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* ── LAYOUT ── */
  .shell {
    display: grid;
    grid-template-rows: 52px 1fr;
    height: 100vh;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, rgba(0,200,255,0.04) 0%, transparent 60%);
    pointer-events: none;
  }
  .logo {
    font-family: var(--mono);
    font-size: 18px;
    color: var(--accent);
    letter-spacing: 3px;
    text-shadow: 0 0 20px rgba(0,200,255,0.5);
  }
  .logo span { color: var(--amber); }
  .tagline {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 2px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }
  .status-pill .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--dim);
    transition: background 0.3s;
  }
  .status-pill.live .dot { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status-pill.busy .dot { background: var(--amber); box-shadow: 0 0 6px var(--amber); animation: blink 1s infinite; }
  .status-pill.err  .dot { background: var(--red);   box-shadow: 0 0 6px var(--red); }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── MAIN ── */
  main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    overflow: hidden;
  }

  /* ── PANELS ── */
  .panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border-right: 1px solid var(--border);
  }
  .panel:last-child { border-right: none; }

  .panel-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .panel-label {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
  }
  .panel-meta {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
  }

  /* ── INPUT PANEL ── */
  .input-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 12px;
    gap: 10px;
    overflow: hidden;
  }

  textarea {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.6;
    padding: 14px;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
  }
  textarea::placeholder { color: var(--muted); }
  textarea:focus { border-color: var(--accent); }

  /* ── CONTROLS ── */
  .controls {
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex-shrink: 0;
  }

  .backend-toggle {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .backend-btn {
    flex: 1;
    padding: 8px;
    background: transparent;
    border: none;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .backend-btn:first-child { border-right: 1px solid var(--border); }
  .backend-btn.active {
    background: rgba(0,200,255,0.12);
    color: var(--accent);
  }
  .backend-btn:hover:not(.active) { background: rgba(255,255,255,0.03); color: var(--text); }

  .backend-config {
    display: none;
    flex-direction: column;
    gap: 6px;
  }
  .backend-config.visible { display: flex; }

  select, input[type="text"] {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 7px 10px;
    outline: none;
    appearance: none;
    cursor: pointer;
  }
  select:focus, input:focus { border-color: var(--accent); }
  select option { background: var(--panel); }

  .row { display: flex; gap: 6px; }

  .btn {
    padding: 9px 18px;
    border: 1px solid;
    border-radius: 3px;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 1.5px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .btn-primary {
    flex: 1;
    background: rgba(0,200,255,0.1);
    border-color: var(--accent);
    color: var(--accent);
  }
  .btn-primary:hover { background: rgba(0,200,255,0.2); box-shadow: 0 0 16px rgba(0,200,255,0.2); }
  .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-ghost {
    background: transparent;
    border-color: var(--border);
    color: var(--muted);
  }
  .btn-ghost:hover { border-color: var(--dim); color: var(--text); }

  .model-progress {
    display: none;
    flex-direction: column;
    gap: 4px;
  }
  .model-progress.visible { display: flex; }
  .progress-label { font-family: var(--mono); font-size: 10px; color: var(--muted); }
  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--green));
    width: 0%;
    transition: width 0.3s;
  }

  /* ── OUTPUT PANEL ── */
  .output-area {
    flex: 1;
    overflow-y: auto;
    padding: 14px 16px;
    font-family: var(--mono);
    font-size: 12.5px;
    line-height: 1.65;
    color: var(--text);
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .output-area::-webkit-scrollbar { width: 4px; }
  .output-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .output-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 10px;
    color: var(--dim);
  }
  .output-placeholder .icon { font-size: 32px; opacity: 0.4; }
  .output-placeholder p { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }

  .output-content {
    white-space: pre-wrap;
    word-break: break-word;
  }

  .output-actions {
    display: flex;
    gap: 8px;
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--surface);
  }
  .char-count {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    display: flex;
    align-items: center;
  }

  /* ── CORNER DECO ── */
  .corner {
    position: absolute;
    width: 10px; height: 10px;
    border-color: var(--accent);
    border-style: solid;
    opacity: 0.4;
  }
  .corner-tl { top: 0; left: 0; border-width: 1px 0 0 1px; }
  .corner-tr { top: 0; right: 0; border-width: 1px 1px 0 0; }
  .corner-bl { bottom: 0; left: 0; border-width: 0 0 1px 1px; }
  .corner-br { bottom: 0; right: 0; border-width: 0 1px 1px 0; }

  .err-msg {
    color: var(--red);
    font-family: var(--mono);
    font-size: 11px;
    padding: 6px 10px;
    border: 1px solid rgba(255,59,59,0.3);
    border-radius: 3px;
    background: rgba(255,59,59,0.06);
    display: none;
  }
  .err-msg.visible { display: block; }
</style>
</head>
<body>
<div class="shell">

  <header>
    <div class="corner corner-tl"></div>
    <div class="logo">PROMPT<span>FORGE</span></div>
    <div class="tagline">Agentic Workflow Compiler // TDD + Guardrails</div>
    <div class="header-right">
      <div class="status-pill" id="statusPill">
        <div class="dot"></div>
        <span id="statusText">IDLE</span>
      </div>
    </div>
    <div class="corner corner-tr"></div>
  </header>

  <main>
    <div class="panel">
      <div class="panel-header">
        <div class="panel-label">// Raw Task Input</div>
        <div class="panel-meta" id="inputCount">0 chars</div>
      </div>
      <div class="input-area">
        <textarea
          id="taskInput"
          placeholder="Paste your raw task, message, or requirement here...&#10;&#10;Describe what needs to be built, upgraded, fixed, or refactored. Include any relevant context: hardware targets, detection objectives, file paths, existing working code, broken code, etc.&#10;&#10;PROMPT FORGE will transform this into a structured Claude Code system prompt with agentic workflow, TDD test scaffold, guardrails, and done criteria."
          spellcheck="false"
        ></textarea>

        <div class="controls">
          <div class="backend-toggle">
            <button class="backend-btn active" id="btnOllama" onclick="setBackend('ollama')">⚡ Ollama (Local)</button>
            <button class="backend-btn" id="btnBrowser" onclick="setBackend('browser')">🧠 Browser AI (WebGPU)</button>
          </div>

          <div class="backend-config visible" id="ollamaConfig">
            <div class="row">
              <select id="ollamaModel">
                <option value="">— fetching models... —</option>
              </select>
              <button class="btn btn-ghost" onclick="fetchOllamaModels()" title="Refresh models">↻</button>
            </div>
            <input type="text" id="ollamaUrl" value="http://localhost:11434" placeholder="Ollama base URL" />
          </div>

          <div class="backend-config" id="browserConfig">
            <select id="browserModel">
              <option value="onnx-community/Qwen2.5-Coder-1.5B-Instruct">Qwen2.5-Coder-1.5B (WebGPU) ~900MB</option>
              <option value="onnx-community/Qwen2.5-0.5B-Instruct">Qwen2.5-0.5B (WebGPU) ~300MB</option>
              <option value="HuggingFaceTB/SmolLM2-1.7B-Instruct">SmolLM2-1.7B (WebGPU) ~1GB</option>
            </select>
            <div class="model-progress" id="modelProgress">
              <div class="progress-label" id="progressLabel">Downloading model...</div>
              <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            </div>
          </div>

          <div class="err-msg" id="errMsg"></div>

          <div class="row">
            <button class="btn btn-primary" id="forgeBtn" onclick="forge()">▶ FORGE PROMPT</button>
            <button class="btn btn-ghost" onclick="clearAll()">✕ CLEAR</button>
          </div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <div class="panel-label">// Agentic Claude Code Prompt</div>
        <div class="panel-meta" id="outputCount">0 chars</div>
      </div>
      <div class="output-area" id="outputArea">
        <div class="output-placeholder" id="outputPlaceholder">
          <div class="icon">◈</div>
          <p>Output appears here</p>
        </div>
        <div class="output-content" id="outputContent" style="display:none"></div>
      </div>
      <div class="output-actions">
        <button class="btn btn-ghost" onclick="copyOutput()" id="copyBtn">⎘ COPY</button>
        <button class="btn btn-ghost" onclick="downloadOutput()">↓ SAVE .MD</button>
        <div class="char-count" id="outputCharCount"></div>
      </div>
    </div>
  </main>
</div>

<script type="module">

// ── SYSTEM PROMPT ─────────────────────────────────────────────────────────────
const SYSTEM_PROMPT = `You are an expert agentic AI workflow architect specializing in Claude Code system prompts.

Your ONLY job: Transform the user's raw task description into a fully structured, production-grade Claude Code system prompt. 

Follow this EXACT skeleton. Fill every section from what the user provided. Derive missing fields from context. Never leave a section empty — if a field is not mentioned, write [CONFIRM WITH USER: <specific question>].

OUTPUT FORMAT — output ONLY the prompt below. No preamble. No "Here is your prompt". No triple-backtick wrapper around the full output.

---
# [Concise Task Title] — Claude Code System Prompt

## ROLE
[One sentence. What role Claude Code plays. e.g. "Senior ML systems engineer performing a surgical production-grade refactor." No greenfield. No scaffold. Read, audit, replace.]

## VERSION MAP
[Include ONLY if multiple repos/codebases/versions are mentioned. Format as table:]
| Name | Path | Status |
|---|---|---|
| WORKING SOURCE | [path] | ✅ Real, working — build from this |
| FAILED/REFERENCE | [path] | ❌ Status |
| YOUR TARGET | [path] | 🔨 What gets built/modified |
[If single repo, replace with: "Single repo. Target: [path]"]

## HARDWARE / ENVIRONMENT TARGET
[Exact hardware, OS, runtimes, versions. If GPU: note unified vs discrete memory. If cloud: region, instance type. Mark TBD if not specified.]

## OBJECTIVE — EXACT
[What to build, detect, produce. Zero ambiguity. Specific inputs → specific outputs. Use table for targets if applicable. Include thresholds, wire priorities, payload schemas if mentioned.]

## WHAT TO BUILD
[Concrete ordered list. Each item: feature name, one-sentence description of EXACT implementation approach. Be specific: library names, API calls, flags, thresholds.]

## WHAT NOT TO BUILD
[Explicitly out-of-scope. Each item: name — one-line reason it's excluded from this build.]

## DELETE / REMOVE
[Files, functions, classes to delete. Format: path/or/function()  # reason]

## PRESERVE — DO NOT TOUCH
[Working code, routes, contracts that must not change. One per line.]

## NEW FILES TO CREATE
[filename or path    # one-line purpose]

## EXECUTION ORDER — TDD, NO SKIPPING STEPS

### Step 1 — Audit
Read the full codebase. Log every broken call, every CPU-bound op, every fake stub, every dead code path as inline comments. Write zero implementation code in this step.

### Step 2 — Write Tests First
File: test_[task_name].py
ALL TESTS MUST FAIL BEFORE IMPLEMENTATION. ALL MUST PASS AFTER. NO EXCEPTIONS.

[List 8–12 specific test cases derived from the objective. Format:
test_[descriptive_name]    [exact assertion in plain English]]

### Step 3 — Implement in This Order
[Numbered list of files to create or modify, in dependency order]

### Step 4 — Validate
\`\`\`bash
pytest test_[task_name].py -v
\`\`\`
All tests green before declaring done.

### Step 5 — Deliver
Complete files only. No truncation. No \`# ... rest of file\`. No TODO comments. No mock returns. No placeholders.

## GUARDRAILS — HARD STOPS
[6–10 STOP conditions derived from the specific failure modes and anti-patterns of THIS task. Format:
- **STOP** if [specific condition] — [what to do instead or why it is banned]]

## DONE WHEN
[8–12 numbered, binary, verifiable success criteria. Each one is either done or it is not.]
---`;

// ── BLOB WORKER INJECTION ─────────────────────────────────────────────────────
const WORKER_CODE = `
import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers';

env.allowLocalModels = false;
env.allowRemoteModels = true;

class WebGPUPipeline {
  static task = 'text-generation';
  static instance = null;

  static async getInstance(modelId, progress_callback = null) {
    if (this.instance === null || this.instance.modelId !== modelId) {
      this.instance = await pipeline(this.task, modelId, {
        device: 'webgpu',
        dtype: 'q4', // Hardware acceleration optimized for browsers
        progress_callback,
      });
      this.instance.modelId = modelId;
    }
    return this.instance;
  }
}

self.addEventListener('message', async (event) => {
  const { text, type, modelId, systemPrompt } = event.data;
  
  if (type === 'generate') {
    try {
      const generator = await WebGPUPipeline.getInstance(modelId, progressData => {
        self.postMessage({ status: 'progress', data: progressData });
      });

      const messages = [
        { role: 'system', content: systemPrompt },
        { role: 'user', content: text }
      ];

      // Streaming execution
      const output = await generator(messages, {
        max_new_tokens: 3000,
        temperature: 0.3,
        do_sample: true,
        streamer: {
          put(tokens) {
            const chunk = tokens[0]?.generated_text?.at(-1)?.content ?? '';
            if (chunk) self.postMessage({ status: 'chunk', text: chunk });
          },
          end() {}
        }
      });

      const fullText = output[0]?.generated_text?.at(-1)?.content ?? '';
      self.postMessage({ status: 'complete', text: fullText });
    } catch (error) {
      self.postMessage({ status: 'error', message: error.message });
    }
  }
});
`;

// ── STATE ─────────────────────────────────────────────────────────────────────
let backend   = 'ollama';
let streaming = false;
let browserWorker = null;

// ── DOM REFS ──────────────────────────────────────────────────────────────────
const taskInput      = document.getElementById('taskInput');
const outputArea     = document.getElementById('outputArea');
const outputContent  = document.getElementById('outputContent');
const outputPlaceholder = document.getElementById('outputPlaceholder');
const forgeBtn       = document.getElementById('forgeBtn');
const statusPill     = document.getElementById('statusPill');
const statusText     = document.getElementById('statusText');
const errMsg         = document.getElementById('errMsg');
const inputCount     = document.getElementById('inputCount');
const outputCount    = document.getElementById('outputCount');
const outputCharCount= document.getElementById('outputCharCount');
const modelProgress  = document.getElementById('modelProgress');
const progressLabel  = document.getElementById('progressLabel');
const progressFill   = document.getElementById('progressFill');
const ollamaConfig   = document.getElementById('ollamaConfig');
const browserConfig  = document.getElementById('browserConfig');

// ── STATUS ────────────────────────────────────────────────────────────────────
function setStatus(state, label) {
  statusPill.className = 'status-pill ' + state;
  statusText.textContent = label;
}

function showErr(msg) {
  errMsg.textContent = msg;
  errMsg.classList.add('visible');
}
function clearErr() {
  errMsg.classList.remove('visible');
}

// ── INPUT COUNTER ─────────────────────────────────────────────────────────────
taskInput.addEventListener('input', () => {
  inputCount.textContent = taskInput.value.length.toLocaleString() + ' chars';
});

// ── BACKEND TOGGLE ────────────────────────────────────────────────────────────
window.setBackend = function(b) {
  backend = b;
  document.getElementById('btnOllama').classList.toggle('active', b === 'ollama');
  document.getElementById('btnBrowser').classList.toggle('active', b === 'browser');
  ollamaConfig.classList.toggle('visible', b === 'ollama');
  browserConfig.classList.toggle('visible', b === 'browser');
  clearErr();
  if (b === 'browser' && !('gpu' in navigator)) {
    showErr('⚠ WebGPU not detected. Use Chrome 113+ or Edge 113+.');
  }
};

// ── OLLAMA MODEL FETCH ────────────────────────────────────────────────────────
async function fetchOllamaModels() {
  const base = document.getElementById('ollamaUrl').value.trim();
  const sel  = document.getElementById('ollamaModel');
  try {
    const res  = await fetch(base + '/api/tags', { signal: AbortSignal.timeout(4000) });
    const data = await res.json();
    const models = (data.models || []).sort((a,b) => a.name.localeCompare(b.name));
    sel.innerHTML = models.length
      ? models.map(m => `<option value="${m.name}">${m.name}</option>`).join('')
      : '<option value="">— no models found —</option>';
    setStatus('live', 'OLLAMA OK');
  } catch {
    sel.innerHTML = '<option value="">— cannot reach Ollama —</option>';
    setStatus('err', 'OLLAMA OFFLINE');
  }
}

// ── OUTPUT HELPERS ────────────────────────────────────────────────────────────
function showOutput(text) {
  outputPlaceholder.style.display = 'none';
  outputContent.style.display     = 'block';
  outputContent.textContent        = text;
  const n = text.length;
  outputCount.textContent     = n.toLocaleString() + ' chars';
  outputCharCount.textContent = n.toLocaleString() + ' chars';
}

function appendOutput(chunk) {
  outputContent.textContent += chunk;
  outputArea.scrollTop = outputArea.scrollHeight;
  const n = outputContent.textContent.length;
  outputCount.textContent     = n.toLocaleString() + ' chars';
  outputCharCount.textContent = n.toLocaleString() + ' chars';
}

function startOutput() {
  outputPlaceholder.style.display = 'none';
  outputContent.style.display     = 'block';
  outputContent.textContent        = '';
  outputCount.textContent     = '0 chars';
  outputCharCount.textContent = '0 chars';
}

function finishGeneration(isError = false) {
  setStatus(isError ? 'err' : 'live', isError ? 'ERROR' : 'COMPLETE');
  streaming = false;
  forgeBtn.disabled = false;
  forgeBtn.textContent = '▶ FORGE PROMPT';
  modelProgress.classList.remove('visible');
}

// ── OLLAMA STREAM ─────────────────────────────────────────────────────────────
async function runOllama(userText) {
  const base  = document.getElementById('ollamaUrl').value.trim();
  const model = document.getElementById('ollamaModel').value;
  if (!model) { showErr('Select an Ollama model first.'); return finishGeneration(true); }

  setStatus('busy', 'GENERATING');
  startOutput();

  const body = JSON.stringify({
    model,
    system: SYSTEM_PROMPT,
    prompt: userText,
    stream: true,
    options: { temperature: 0.3, num_ctx: 8192 }
  });

  const res = await fetch(base + '/api/generate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body
  });

  if (!res.ok) throw new Error(`Ollama HTTP ${res.status}`);

  const reader = res.body.getReader();
  const dec    = new TextDecoder();

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    const lines = dec.decode(value).split('\n').filter(Boolean);
    for (const line of lines) {
      try {
        const obj = JSON.parse(line);
        if (obj.response) appendOutput(obj.response);
        if (obj.done) break;
      } catch {}
    }
  }
  finishGeneration();
}

// ── BROWSER AI (Web Worker Integration) ───────────────────────────────────────
async function runBrowser(userText) {
  if (!('gpu' in navigator)) throw new Error('WebGPU not supported in this browser.');
  const modelId = document.getElementById('browserModel').value;

  if (!browserWorker) {
    // Generate the blob at runtime
    const blob = new Blob([WORKER_CODE], { type: 'application/javascript' });
    browserWorker = new Worker(URL.createObjectURL(blob), { type: 'module' });

    browserWorker.addEventListener('message', (e) => {
      const { status, data, text, message } = e.data;
      
      if (status === 'progress') {
        modelProgress.classList.add('visible');
        setStatus('busy', 'LOADING MODEL');
        if (data.status === 'downloading') {
          const pct = data.total ? Math.round((data.loaded / data.total) * 100) : 0;
          progressLabel.textContent = `Downloading: ${data.file || ''} ${pct}%`;
          progressFill.style.width  = pct + '%';
        } else if (data.status === 'ready' || data.status === 'loading') {
          progressLabel.textContent = 'Loading model into WebGPU...';
          progressFill.style.width  = '95%';
        }
      } else if (status === 'chunk') {
        modelProgress.classList.remove('visible');
        setStatus('busy', 'GENERATING');
        appendOutput(text);
      } else if (status === 'complete') {
        if (!outputContent.textContent.trim() && text) showOutput(text);
        finishGeneration();
      } else if (status === 'error') {
        showErr('Worker Error: ' + message);
        finishGeneration(true);
      }
    });
  }

  setStatus('busy', 'INITIALIZING');
  startOutput();

  browserWorker.postMessage({
    type: 'generate',
    text: userText,
    modelId: modelId,
    systemPrompt: SYSTEM_PROMPT
  });
}

// ── MAIN FORGE ────────────────────────────────────────────────────────────────
window.forge = async function() {
  const userText = taskInput.value.trim();
  if (!userText) { showErr('Paste a task description first.'); return; }
  if (streaming)  return;

  clearErr();
  streaming = true;
  forgeBtn.disabled = true;
  forgeBtn.textContent = '⏳ FORGING...';

  try {
    if (backend === 'ollama') {
      await runOllama(userText);
    } else {
      await runBrowser(userText);
    }
  } catch (e) {
    showErr('Error: ' + (e.message || String(e)));
    finishGeneration(true);
    console.error(e);
  }
};

// ── COPY / SAVE ───────────────────────────────────────────────────────────────
window.copyOutput = async function() {
  const text = outputContent.textContent;
  if (!text) return;
  await navigator.clipboard.writeText(text);
  const btn = document.getElementById('copyBtn');
  btn.textContent = '✓ COPIED';
  setTimeout(() => { btn.textContent = '⎘ COPY'; }, 1800);
};

window.downloadOutput = function() {
  const text = outputContent.textContent;
  if (!text) return;
  const blob = new Blob([text], { type: 'text/markdown' });
  const url  = URL.createObjectURL(blob);
  const a    = Object.assign(document.createElement('a'), {
    href:     url,
    download: 'agentic-prompt.md'
  });
  a.click();
  URL.revokeObjectURL(url);
};

window.clearAll = function() {
  taskInput.value = '';
  outputContent.textContent = '';
  outputContent.style.display = 'none';
  outputPlaceholder.style.display = 'flex';
  outputCount.textContent = '0 chars';
  outputCharCount.textContent = '';
  inputCount.textContent = '0 chars';
  clearErr();
  setStatus('', 'IDLE');
};

// ── KEYBOARD SHORTCUT ─────────────────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
    e.preventDefault();
    forge();
  }
});

// ── INIT ──────────────────────────────────────────────────────────────────────
fetchOllamaModels();

</script>
